<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사중력사목 온라인 V1 클라이언트</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }
    .app {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }
    .subtitle {
      margin-bottom: 18px;
      color: #4b5563;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 20px;
    }
    .board-card, .side-card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.07);
      padding: 18px;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 6px;
      width: min(78vw, 760px);
      aspect-ratio: 1 / 1;
      margin: 0 auto;
      background: #c58c56;
      padding: 10px;
      border-radius: 16px;
      user-select: none;
    }
    .cell {
      background: #e9c79b;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.08);
      position: relative;
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.15s ease;
    }
    .cell:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.10);
    }
    .cell.disabled {
      cursor: not-allowed;
      opacity: 0.85;
    }
    .cell.selectable {
      outline: 3px solid #60a5fa;
      outline-offset: -3px;
      background: #e6f1ff;
    }
    .cell.last-placed {
      box-shadow: inset 0 0 0 3px #f59e0b;
    }
    .cell.last-moved {
      box-shadow: inset 0 0 0 3px #10b981;
    }
    .stone {
      position: absolute;
      inset: 11%;
      border-radius: 999px;
      box-shadow: inset 0 -5px 8px rgba(255,255,255,0.18), 0 6px 12px rgba(0,0,0,0.18);
    }
    .stone.black { background: linear-gradient(145deg, #3f3f46, #09090b); }
    .stone.white { background: linear-gradient(145deg, #ffffff, #d1d5db); }
    .stone.neutral {
      inset: 18%;
      background: linear-gradient(145deg, #93c5fd, #2563eb);
    }
    .status, .room-box, .request-box, .notice-box, .tests-box {
      padding: 12px 14px;
      border-radius: 12px;
      background: #f3f4f6;
      line-height: 1.55;
      margin-bottom: 14px;
    }
    .notice-box {
      background: #fff7ed;
      border: 1px solid #fdba74;
      color: #9a3412;
    }
    .tests-box {
      background: #eff6ff;
      border: 1px solid #93c5fd;
      color: #1e3a8a;
    }
    .turn-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #eef2ff;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .mini-stone {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: inline-block;
      vertical-align: middle;
      box-shadow: inset 0 -2px 4px rgba(255,255,255,0.18), 0 2px 4px rgba(0,0,0,0.18);
    }
    .mini-stone.black { background: linear-gradient(145deg, #3f3f46, #09090b); }
    .mini-stone.white { background: linear-gradient(145deg, #ffffff, #d1d5db); border: 1px solid #cbd5e1; }
    .section-title {
      font-size: 15px;
      font-weight: 800;
      margin: 14px 0 10px;
    }
    .gravity-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 10px;
      background: #111827;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.12s ease, background 0.12s ease;
    }
    button:hover:not(:disabled) { transform: translateY(-1px); }
    button:disabled {
      opacity: 0.38;
      cursor: not-allowed;
    }
    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }
    button.success {
      background: #059669;
    }
    button.danger {
      background: #dc2626;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .log {
      max-height: 280px;
      overflow: auto;
      padding: 10px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      font-size: 14px;
      line-height: 1.5;
    }
    .log-item {
      padding: 6px 0;
      border-bottom: 1px solid #eef2f7;
    }
    .log-item:last-child { border-bottom: none; }
    .small {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }
    .winner {
      padding: 12px 14px;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      color: #065f46;
      border-radius: 12px;
      font-weight: 800;
      margin-top: 10px;
    }
    input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .hidden { display: none; }
    .pass { color: #166534; font-weight: 700; }
    .fail { color: #991b1b; font-weight: 700; }
    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .board {
        width: min(92vw, 760px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>사중력사목 온라인 V1</h1>
    <div class="subtitle">2인 온라인 대전 · 방 생성/참가 · 실시간 동기화 · Undo/Redo는 상호 동의 시만 가능</div>

    <div id="noticeBox" class="notice-box hidden"></div>

    <div class="layout">
      <div class="board-card">
        <div id="board" class="board"></div>
      </div>

      <div class="side-card">
        <div class="room-box">
          <div class="section-title">방 관리</div>
          <input id="nicknameInput" placeholder="닉네임 (예: 찬영)" maxlength="20" />
          <div class="row">
            <button id="createRoomBtn">방 만들기</button>
          </div>
          <input id="roomCodeInput" placeholder="방 코드 입력" maxlength="8" />
          <div class="row">
            <button id="joinRoomBtn" class="secondary">방 참가</button>
            <button id="copyRoomBtn" class="secondary">방 코드 복사</button>
          </div>
          <div id="roomInfo" class="small" style="margin-top: 8px;">아직 방에 들어가지 않았습니다.</div>
        </div>

        <div id="turnBadge" class="turn-badge"></div>
        <div id="status" class="status"></div>

        <div class="section-title">중력 선택</div>
        <div class="gravity-grid">
          <div></div>
          <button data-gravity="up">↑ 상</button>
          <div></div>
          <button data-gravity="left">← 좌</button>
          <button data-gravity="none">· 무</button>
          <button data-gravity="right">→ 우</button>
          <div></div>
          <button data-gravity="down">↓ 하</button>
          <div></div>
        </div>
        <div class="small">자신의 이전 턴과 같은 방향은 연속 사용 불가입니다.</div>

        <div class="section-title">합의형 되돌리기</div>
        <div class="row">
          <button id="requestUndoBtn" class="secondary">Undo 요청</button>
          <button id="requestRedoBtn" class="secondary">Redo 요청</button>
          <button id="newGameBtn" class="secondary">새 게임</button>
        </div>

        <div id="requestBox" class="request-box hidden">
          <div id="requestText" style="margin-bottom: 10px;"></div>
          <div class="row">
            <button id="approveRequestBtn" class="success">승인</button>
            <button id="rejectRequestBtn" class="danger">거절</button>
          </div>
        </div>

        <div id="winnerBox"></div>

        <div class="section-title">로그</div>
        <div id="log" class="log"></div>
      </div>
    </div>
  </div>

  <script>
    const EMPTY = 0;
    const BLACK = 1;
    const WHITE = 2;
    const NEUTRAL = 3;
    const SIZE = 9;

    const gravityLabels = {
      up: "상",
      down: "하",
      left: "좌",
      right: "우",
      none: "무",
    };

    const uiState = {
      roomCode: null,
      myPlayer: null,
      myNickname: "",
      connectedPlayers: 0,
      pendingRequest: null,
      game: null,
      onlineEnabled: false,
    };

    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const turnBadgeEl = document.getElementById("turnBadge");
    const winnerBoxEl = document.getElementById("winnerBox");
    const logEl = document.getElementById("log");
    const roomInfoEl = document.getElementById("roomInfo");
    const requestBoxEl = document.getElementById("requestBox");
    const requestTextEl = document.getElementById("requestText");
    const noticeBoxEl = document.getElementById("noticeBox");
    const testsBoxEl = document.getElementById("testsBox");
    const nicknameInput = document.getElementById("nicknameInput");
    const roomCodeInput = document.getElementById("roomCodeInput");
    const gravityButtons = [...document.querySelectorAll("button[data-gravity]")];
    const createRoomBtn = document.getElementById("createRoomBtn");
    const joinRoomBtn = document.getElementById("joinRoomBtn");
    const copyRoomBtn = document.getElementById("copyRoomBtn");
    const requestUndoBtn = document.getElementById("requestUndoBtn");
    const requestRedoBtn = document.getElementById("requestRedoBtn");
    const newGameBtn = document.getElementById("newGameBtn");
    const approveRequestBtn = document.getElementById("approveRequestBtn");
    const rejectRequestBtn = document.getElementById("rejectRequestBtn");

    const socket = initializeSocket();
    bindStaticEvents();
    bindSocketEvents(socket);
    uiState.game = emptyGame();
    render();

    function initializeSocket() {
      if (typeof window.io !== "function") {
        uiState.onlineEnabled = false;
        showNotice("Socket.IO 클라이언트를 찾지 못했습니다. 현재는 오프라인 미리보기 모드입니다. 실제 온라인 대전을 하려면 Express/Socket.IO 서버에서 이 페이지를 열어야 합니다.");
        return createNoopSocket();
      }

      try {
        const realSocket = window.io();
        uiState.onlineEnabled = true;
        hideNotice();
        return realSocket;
      } catch (error) {
        uiState.onlineEnabled = false;
        showNotice(`Socket.IO 초기화에 실패했습니다: ${error.message}. 현재는 오프라인 미리보기 모드입니다.`);
        return createNoopSocket();
      }
    }

    function createNoopSocket() {
      const handlers = new Map();
      return {
        on(eventName, handler) {
          handlers.set(eventName, handler);
        },
        emit(eventName) {
          const blockedEvents = new Set(["create_room", "join_room", "player_action", "request_action", "respond_request", "new_game"]);
          if (blockedEvents.has(eventName)) {
            showNotice("현재는 오프라인 미리보기 모드입니다. 서버를 실행한 뒤 접속하면 온라인 기능이 활성화됩니다.");
          }
        }
      };
    }

    function bindStaticEvents() {
      createRoomBtn.addEventListener("click", createRoom);
      joinRoomBtn.addEventListener("click", joinRoom);
      copyRoomBtn.addEventListener("click", copyRoomCode);
      newGameBtn.addEventListener("click", () => {
        if (!uiState.roomCode) return;
        socket.emit("new_game", { roomCode: uiState.roomCode });
      });
      requestUndoBtn.addEventListener("click", () => sendActionRequest("undo"));
      requestRedoBtn.addEventListener("click", () => sendActionRequest("redo"));
      approveRequestBtn.addEventListener("click", () => respondToRequest(true));
      rejectRequestBtn.addEventListener("click", () => respondToRequest(false));

      gravityButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          if (!uiState.roomCode || !uiState.game || !uiState.onlineEnabled) return;
          socket.emit("player_action", {
            roomCode: uiState.roomCode,
            action: { type: "gravity", direction: btn.dataset.gravity },
          });
        });
      });
    }

    function bindSocketEvents(activeSocket) {
      activeSocket.on("room_joined", payload => {
        uiState.roomCode = payload.roomCode;
        uiState.myPlayer = payload.player;
        uiState.myNickname = payload.nickname;
        uiState.connectedPlayers = payload.connectedPlayers;
        uiState.game = payload.game;
        updateRoomInfo();
        render();
      });

      activeSocket.on("room_state", payload => {
        uiState.connectedPlayers = payload.connectedPlayers;
        uiState.game = payload.game;
        updateRoomInfo();
        render();
      });

      activeSocket.on("request_received", payload => {
        uiState.pendingRequest = payload;
        renderRequestBox();
      });

      activeSocket.on("request_cleared", () => {
        uiState.pendingRequest = null;
        renderRequestBox();
      });

      activeSocket.on("error_message", payload => {
        alert(payload.message);
      });
    }

    function createRoom() {
      try {
        const nickname = readNickname();
        if (!uiState.onlineEnabled) {
          showNotice("오프라인 미리보기에서는 방을 만들 수 없습니다. 서버를 실행한 뒤 접속하세요.");
          return;
        }
        socket.emit("create_room", { nickname });
      } catch {}
    }

    function joinRoom() {
      try {
        const nickname = readNickname();
        const roomCode = roomCodeInput.value.trim().toUpperCase();
        if (!roomCode) {
          alert("방 코드를 입력하세요.");
          return;
        }
        if (!uiState.onlineEnabled) {
          showNotice("오프라인 미리보기에서는 방에 참가할 수 없습니다. 서버를 실행한 뒤 접속하세요.");
          return;
        }
        socket.emit("join_room", { roomCode, nickname });
      } catch {}
    }

    function readNickname() {
      const nickname = nicknameInput.value.trim();
      if (!nickname) {
        alert("닉네임을 입력하세요.");
        throw new Error("nickname required");
      }
      return nickname;
    }

    function copyRoomCode() {
      if (!uiState.roomCode) return;
      navigator.clipboard.writeText(uiState.roomCode)
        .then(() => alert(`방 코드 복사 완료: ${uiState.roomCode}`))
        .catch(() => alert("복사에 실패했습니다."));
    }

    function sendActionRequest(type) {
      if (!uiState.roomCode || !uiState.onlineEnabled) return;
      socket.emit("request_action", { roomCode: uiState.roomCode, requestType: type });
    }

    function respondToRequest(approved) {
      if (!uiState.roomCode || !uiState.pendingRequest || !uiState.onlineEnabled) return;
      socket.emit("respond_request", {
        roomCode: uiState.roomCode,
        requestId: uiState.pendingRequest.requestId,
        approved,
      });
    }

    function updateRoomInfo() {
      const role = uiState.myPlayer === BLACK ? "흑" : uiState.myPlayer === WHITE ? "백" : "관전자";
      roomInfoEl.textContent = uiState.roomCode
        ? `방 코드: ${uiState.roomCode} · 내 역할: ${role} · 접속 인원: ${uiState.connectedPlayers}/2`
        : (uiState.onlineEnabled ? "아직 방에 들어가지 않았습니다." : "오프라인 미리보기 모드입니다.");
    }

    function render() {
      renderBoard();
      renderStatus();
      renderGravityButtons();
      renderRequestButtons();
      renderWinner();
      renderLog();
      renderRequestBox();
      updateRoomInfo();
    }

    function renderBoard() {
      boardEl.innerHTML = "";
      const game = uiState.game || emptyGame();
      const selectableSet = new Set((game.selectableNeutralCells || []).map(pos => `${pos.r},${pos.c}`));
      const placedKey = game.placedPosition ? `${game.placedPosition.r},${game.placedPosition.c}` : null;
      const movedKey = game.movedPosition ? `${game.movedPosition.r},${game.movedPosition.c}` : null;

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          const key = `${r},${c}`;

          if (game.phase === "neutral" && selectableSet.has(key)) {
            cell.classList.add("selectable");
          }
          if (placedKey === key) cell.classList.add("last-placed");
          if (movedKey === key) cell.classList.add("last-moved");

          const value = game.board[r][c];
          if (value !== EMPTY) {
            const stone = document.createElement("div");
            stone.className = `stone ${value === BLACK ? "black" : value === WHITE ? "white" : "neutral"}`;
            cell.appendChild(stone);
          }

          if (!isCellInteractive(r, c, game)) {
            cell.classList.add("disabled");
          }

          cell.addEventListener("click", () => handleCellClick(r, c));
          boardEl.appendChild(cell);
        }
      }
    }

    function isMyTurn(game) {
      return uiState.myPlayer && game.currentPlayer === uiState.myPlayer && game.phase !== "gameover";
    }

    function isCellInteractive(r, c, game) {
      if (!uiState.roomCode || !isMyTurn(game) || !uiState.onlineEnabled) return false;
      if (game.phase === "place") return game.board[r][c] === EMPTY;
      if (game.phase === "neutral") {
        return (game.selectableNeutralCells || []).some(pos => pos.r === r && pos.c === c);
      }
      return false;
    }

    function handleCellClick(r, c) {
      const game = uiState.game;
      if (!game || !isMyTurn(game) || !uiState.onlineEnabled) return;
      if (game.phase === "place") {
        socket.emit("player_action", {
          roomCode: uiState.roomCode,
          action: { type: "place", r, c },
        });
      } else if (game.phase === "neutral") {
        socket.emit("player_action", {
          roomCode: uiState.roomCode,
          action: { type: "neutral", r, c },
        });
      }
    }

    function renderStatus() {
      const game = uiState.game || emptyGame();
      const myStoneClass = uiState.myPlayer === WHITE ? "white" : "black";
      const turnName = game.currentPlayer === BLACK ? "흑" : "백";
      turnBadgeEl.innerHTML = `<span class="mini-stone ${myStoneClass}"></span> 내 역할: ${uiState.myPlayer === BLACK ? "흑" : uiState.myPlayer === WHITE ? "백" : "없음"}`;

      if (!uiState.onlineEnabled) {
        statusEl.textContent = "오프라인 미리보기 모드입니다. 서버가 연결되면 온라인 기능이 활성화됩니다.";
        return;
      }
      if (!uiState.roomCode) {
        statusEl.textContent = "방을 만들거나 참가하세요.";
        return;
      }
      if (uiState.connectedPlayers < 2) {
        statusEl.textContent = "상대 플레이어를 기다리는 중입니다.";
        return;
      }
      if (game.phase === "gameover") {
        statusEl.textContent = "게임 종료";
        return;
      }
      if (!isMyTurn(game)) {
        statusEl.textContent = `상대 턴입니다. 현재 턴: ${turnName}`;
        return;
      }
      if (game.phase === "place") {
        statusEl.textContent = "당신의 턴입니다. 빈 칸을 클릭해 돌을 두세요.";
      } else if (game.phase === "gravity") {
        const last = game.lastGravity[game.currentPlayer];
        statusEl.textContent = `당신의 턴입니다. 중력 방향을 선택하세요. ${last ? `(이번 턴에는 '${gravityLabels[last]}' 사용 불가)` : ""}`;
      } else if (game.phase === "neutral") {
        statusEl.textContent = "당신의 턴입니다. 하이라이트된 칸 중 하나를 클릭해 중립 돌을 두세요.";
      }
    }

    function renderGravityButtons() {
      const game = uiState.game || emptyGame();
      gravityButtons.forEach(btn => {
        const dir = btn.dataset.gravity;
        const forbidden = game.lastGravity[game.currentPlayer] === dir;
        btn.disabled = !isMyTurn(game) || game.phase !== "gravity" || forbidden || !uiState.onlineEnabled;
      });
    }

    function renderRequestButtons() {
      const game = uiState.game || emptyGame();
      const canRequest = !!uiState.roomCode && uiState.connectedPlayers === 2 && game.history.length > 0 && uiState.onlineEnabled;
      requestUndoBtn.disabled = !canRequest;
      requestRedoBtn.disabled = !(!!uiState.roomCode && uiState.connectedPlayers === 2 && game.future.length > 0 && uiState.onlineEnabled);
      newGameBtn.disabled = !uiState.roomCode || !uiState.onlineEnabled;
    }

    function renderWinner() {
      const game = uiState.game || emptyGame();
      winnerBoxEl.innerHTML = game.winner
        ? `<div class="winner">승리: ${escapeHtml(game.winner)}</div>`
        : "";
    }

    function renderLog() {
      const game = uiState.game || emptyGame();
      logEl.innerHTML = game.log.map(item => `<div class="log-item">${escapeHtml(item)}</div>`).join("");
      logEl.scrollTop = logEl.scrollHeight;
    }

    function renderRequestBox() {
      if (!uiState.pendingRequest) {
        requestBoxEl.classList.add("hidden");
        return;
      }
      requestBoxEl.classList.remove("hidden");
      const typeName = uiState.pendingRequest.requestType === "undo" ? "Undo" : "Redo";
      requestTextEl.textContent = `${uiState.pendingRequest.fromNickname} 님이 ${typeName}를 요청했습니다.`;
    }

    function showNotice(message) {
      noticeBoxEl.textContent = message;
      noticeBoxEl.classList.remove("hidden");
    }

    function hideNotice() {
      noticeBoxEl.textContent = "";
      noticeBoxEl.classList.add("hidden");
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function emptyGame() {
      return {
        board: Array.from({ length: SIZE }, () => Array(SIZE).fill(EMPTY)),
        currentPlayer: BLACK,
        phase: "place",
        lastGravity: { [BLACK]: null, [WHITE]: null },
        placedPosition: null,
        movedPosition: null,
        selectableNeutralCells: [],
        winner: null,
        moveNumber: 1,
        log: ["미리보기 모드 초기화 완료"],
        history: [],
        future: [],
      };
    }

    function getPathBetweenExclusive(start, end) {
      const cells = [];
      if (start.r === end.r && start.c === end.c) return cells;

      if (start.r === end.r) {
        const step = start.c < end.c ? 1 : -1;
        for (let c = start.c + step; c !== end.c; c += step) {
          cells.push({ r: start.r, c });
        }
      } else if (start.c === end.c) {
        const step = start.r < end.r ? 1 : -1;
        for (let r = start.r + step; r !== end.r; r += step) {
          cells.push({ r, c: start.c });
        }
      }
      return cells;
    }

    function runSelfTests() {
      const results = [];

      function test(name, fn) {
        try {
          fn();
          results.push({ name, pass: true });
        } catch (error) {
          results.push({ name, pass: false, error: error.message });
        }
      }

      function assert(condition, message) {
        if (!condition) throw new Error(message);
      }

      test("Socket fallback exists when io is missing", () => {
        const previousIo = window.io;
        try {
          window.io = undefined;
          const s = initializeSocket();
          assert(typeof s.on === "function", "fallback socket should expose on()");
          assert(typeof s.emit === "function", "fallback socket should expose emit()");
        } finally {
          window.io = previousIo;
        }
      });

      test("Path between identical points is empty", () => {
        const path = getPathBetweenExclusive({ r: 2, c: 2 }, { r: 2, c: 2 });
        assert(Array.isArray(path), "path should be array");
        assert(path.length === 0, "path should be empty");
      });

      test("Horizontal path excludes endpoints", () => {
        const path = getPathBetweenExclusive({ r: 1, c: 1 }, { r: 1, c: 4 });
        assert(path.length === 2, "expected two intermediate cells");
        assert(path[0].c === 2 && path[1].c === 3, "unexpected horizontal path contents");
      });

      test("Vertical reverse path excludes endpoints", () => {
        const path = getPathBetweenExclusive({ r: 4, c: 3 }, { r: 1, c: 3 });
        assert(path.length === 2, "expected two intermediate cells");
        assert(path[0].r === 3 && path[1].r === 2, "unexpected vertical path contents");
      });

      test("Empty game board is 9x9", () => {
        const game = emptyGame();
        assert(game.board.length === 9, "row count should be 9");
        assert(game.board.every(row => row.length === 9), "column count should be 9");
      });

      return results;
    }

    function renderTests(results) {
      const passCount = results.filter(r => r.pass).length;
      const failCount = results.length - passCount;
      const items = results.map(result => {
        if (result.pass) {
          return `<div><span class="pass">PASS</span> ${escapeHtml(result.name)}</div>`;
        }
        return `<div><span class="fail">FAIL</span> ${escapeHtml(result.name)} — ${escapeHtml(result.error || "unknown error")}</div>`;
      }).join("");
      testsBoxEl.innerHTML = `<div><strong>내장 테스트</strong> · ${passCount} 통과 / ${failCount} 실패</div>${items}`;
    }
  </script>
</body>
